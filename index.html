<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="탄생화, 탄생화앱, 생일">
    <meta name="description" content="내가 태어난 날의 탄생화는 무엇일까 알아봅시다.">
    <title>나의 탄생화는 무엇일까?</title>
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/128/7359/7359103.png" type="image/x-icon">
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/index.css">
    <script src="./scripts/index.js" defer></script>
</head>
<body>
    <main>
        <div class="title">
            <p>The Flower of My Birth day</p>
            <h1>나의 탄생화 찾기</h1>
        </div>
        <div class="contents">
            <input id="user_birthday" placeholder="태어난 달을 숫자로 입력해주세요" onclick="birthdayInput()"> <!-- 인라인 -->
            <button id="birthday_result_btn" onclick="popupShow()">나의 꽃과 꽃말 만나기</button> <!-- 인라인 -->
            <!-- a태그는 클릭 시 다른페이지로 이동 -->
            <!-- button태그 클릭 시 범용기능 동적재현 -->
             <!-- 꽃말 팝업 -->
            </div>
            <div class="flower_popup">
                <h2>birthday Month 12</h2>
                <p>꽃말 : 자기애, 자존심, 외로움</p>
                <p>당신의 탄생화는 <br>‘수선화’ 입니다.</p>
            </div>
            <!-- 글쓰기 팝업 뒤 배경 -->
            <div class="popup_bg" onclick="popupDown()"></div>
    </main>
</body>
</html>
